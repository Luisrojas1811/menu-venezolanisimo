<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venezolanísimo - Menú</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a1a2e;
            --card-bg: #ffffff;
            --ven-blue: #003893;
            --ven-red: #ce1126;
            --ven-yellow: #ffcc4d;
            --text-dark: #1a1a2e;
            --text-gray: #555;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: white;
        }

        .header {
            background: linear-gradient(180deg, var(--ven-red) 0%, #8b0000 100%);
            text-align: center;
            padding: 28px 0 50px;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '🇻🇪';
            font-size: 80px;
            position: absolute;
            top: -10px; left: -20px;
            opacity: 0.08;
        }
        .header::after {
            content: '🇻🇪';
            font-size: 80px;
            position: absolute;
            top: -10px; right: -20px;
            opacity: 0.08;
        }

        .header-logo-circle {
            width: 90px; height: 90px;
            border: 3px solid var(--ven-yellow);
            border-radius: 50%;
            background: white;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto;
            font-size: 2.5rem;
            position: relative; z-index: 2;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .header h1 {
            color: white;
            margin: 10px 0 4px;
            font-size: 1.6rem;
            letter-spacing: 1px;
            position: relative; z-index: 2;
        }

        .header p {
            color: var(--ven-yellow);
            font-size: 0.75rem;
            margin: 0;
            position: relative; z-index: 2;
        }

        .aviso-retiro {
            background-color: var(--ven-yellow);
            color: #000;
            text-align: center;
            padding: 12px 10px;
            font-size: 0.82rem;
            font-weight: bold;
            margin-top: -22px;
            position: relative;
            z-index: 3;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border-bottom: 3px solid var(--ven-blue);
            line-height: 1.4;
        }

        .container { max-width: 500px; margin: 0 auto; padding: 15px; }

        .categoria-titulo {
            color: var(--ven-yellow);
            font-size: 1.2rem;
            font-weight: bold;
            margin: 28px 0 12px;
            text-transform: uppercase;
            border-left: 4px solid var(--ven-red);
            padding-left: 10px;
            letter-spacing: 0.5px;
        }

        .producto-card {
            background-color: var(--card-bg);
            border-radius: 14px;
            margin-bottom: 14px;
            display: flex;
            overflow: hidden;
            border: 2px solid var(--ven-yellow);
            color: var(--text-dark);
            box-shadow: 0 5px 14px rgba(0,0,0,0.35);
            min-height: 140px;
        }

        .contenedor-img {
            width: 130px;
            position: relative;
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            background: #f0e8d0;
            flex-shrink: 0;
        }
        .contenedor-img::-webkit-scrollbar { display: none; }

        .img-producto {
            width: 130px;
            height: auto;
            min-height: 140px;
            object-fit: cover;
            flex-shrink: 0;
            scroll-snap-align: start;
        }

        .sin-foto {
            width: 130px;
            min-height: 140px;
            background: linear-gradient(135deg, #f5e6c8, #e8d5a3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            flex-shrink: 0;
        }

        .barra-azul { background-color: var(--ven-blue); width: 8px; flex-shrink: 0; }
        .contenido { flex-grow: 1; padding: 11px 12px; display: flex; flex-direction: column; justify-content: center; }
        .contenido h3 { margin: 0; font-size: 0.9rem; color: var(--ven-blue); display: flex; justify-content: space-between; gap: 5px; }
        .precio-tag { font-weight: bold; color: var(--ven-red); white-space: nowrap; }
        .descripcion { font-size: 0.72rem; color: var(--text-gray); margin: 4px 0 6px; line-height: 1.3; }

        .contenedor-rellenos {
            display: grid; grid-template-columns: 1fr 1fr; gap: 3px;
            margin: 6px 0; background: #f5f5f5; padding: 6px; border-radius: 6px;
        }
        .relleno-item { font-size: 0.63rem; display: flex; align-items: center; gap: 3px; color: #333; }

        .input-notas {
            width: 100%; padding: 7px; border: 1px solid #ddd; border-radius: 5px;
            margin-top: 5px; font-size: 0.75rem; box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        .btn-agregar {
            background-color: var(--ven-blue); color: white; border: none;
            padding: 9px; border-radius: 6px; width: 100%; font-weight: bold;
            margin-top: 8px; cursor: pointer; font-size: 0.72rem;
            font-family: 'Montserrat', sans-serif;
            transition: background 0.2s;
        }
        .btn-agregar:active { background: #001f5c; }

        .controles-qty {
            display: flex; align-items: center; background: #f1f3f5;
            border-radius: 8px; padding: 4px; width: fit-content;
            margin-top: 8px; border: 1px solid var(--ven-blue);
        }
        .btn-qty {
            background: var(--ven-blue); color: white; border: none;
            width: 28px; height: 28px; border-radius: 5px; font-size: 1.1rem;
            cursor: pointer; font-weight: bold;
        }
        .qty-num { margin: 0 10px; font-weight: bold; color: var(--ven-blue); font-size: 0.9rem; }

        .footer-carrito {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: white; color: var(--text-dark);
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5); z-index: 100;
        }
        .resumen-items {
            max-height: 110px; overflow-y: auto; padding: 8px 12px;
            font-size: 0.78rem; border-bottom: 1px solid #eee;
        }
        .item-carrito {
            display: flex; justify-content: space-between;
            padding: 4px 0; border-bottom: 1px dashed #ddd;
            font-size: 0.77rem;
        }
        .total-area { padding: 12px 15px; text-align: center; }
        .btn-whatsapp {
            background: linear-gradient(135deg, var(--ven-red), #a00d1d);
            color: white; border: none; padding: 14px; border-radius: 8px;
            font-weight: bold; width: 100%; cursor: pointer; font-size: 0.9rem;
            font-family: 'Montserrat', sans-serif; letter-spacing: 0.5px;
        }
        .espaciador-final { height: 260px; }

        .ig-link {
            text-align: center;
            padding: 10px;
            font-size: 0.7rem;
            color: #aaa;
        }
        .ig-link a { color: var(--ven-yellow); text-decoration: none; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-logo-circle">🇻🇪</div>
    <h1>Venezolanísimo</h1>
    <p>Sabor venezolano auténtico</p>
</div>

<div class="aviso-retiro">
    📱 Seguinos en Instagram: <a href="https://www.instagram.com/venezolanisimo.cba" style="color:#003893;">@venezolanisimo.cba</a>
</div>

<div class="container" id="menu-box"></div>
<div class="ig-link">📲 <a href="https://www.instagram.com/venezolanisimo.cba">@venezolanisimo.cba</a></div>
<div class="espaciador-final"></div>

<div class="footer-carrito">
    <div id="resumen" class="resumen-items">Tu pedido está vacío</div>
    <div class="total-area">
        <div id="total-val" style="font-weight:bold;margin-bottom:10px;font-size:1.05rem;">Total: $0.00</div>
        <button class="btn-whatsapp" onclick="enviarPedido()">🛒 PEDIR POR WHATSAPP</button>
    </div>
</div>

                    <button class="btn-qty" onclick="cambiarCantidad('${id}', '${item.n}', ${item.p}, -1)">−</button>
                    <span class="qty-num" id="qty-${id}">0</span>
                    <button class="btn-qty" onclick="cambiarCantidad('${id}', '${item.n}', ${item.p}, 1)">+</button>
                </div>`;

                const showNota = seccion.placeholder || item.placeholder;

                box.innerHTML += `
                    <div class="producto-card">
                        ${htmlFotos}
                        <div class="barra-azul"></div>
                        <div class="contenido">
                            <h3>${item.n} <span class="precio-tag">$${item.p.toLocaleString('es-AR')}</span></h3>
                            ${item.det ? `<div class="descripcion">${item.det}</div>` : ''}
                            ${showNota ? `<input type="text" id="nota-${id}" class="input-notas" placeholder="${item.placeholder || seccion.placeholder}" oninput="actualizarNotaFija('${id}')">` : ''}
                            ${htmlAccion}
                        </div>
                    </div>`;
            });
        });
    }

    function cambiarCantidad(id, nombre, precio, delta) {
        cantidadesFijas[id] = Math.max(0, (cantidadesFijas[id] || 0) + delta);
        document.getElementById(`qty-${id}`).innerText = cantidadesFijas[id];
        const nota = document.getElementById(`nota-${id}`)?.value || "";
        carrito = carrito.filter(item => item.id_ref !== id);
        if (cantidadesFijas[id] > 0) {
            carrito.push({ id_ref: id, nombre, precio: precio * cantidadesFijas[id], cant: cantidadesFijas[id], nota });
        }
        actualizarCarrito();
    }

    function actualizarNotaFija(id) {
        const item = carrito.find(i => i.id_ref === id);
        if (item) item.nota = document.getElementById(`nota-${id}`).value;
        actualizarCarrito();
    }

    function actualizarCarrito() {
        const res = document.getElementById('resumen');
        let total = 0;
        if (carrito.length === 0) {
            res.innerHTML = "Tu pedido está vacío";
            document.getElementById('total-val').innerText = "Total: $0";
            return;
        }
        res.innerHTML = carrito.map(item => {
            total += item.precio;
            return `<div class="item-carrito">
                <span>${item.cant}x ${item.nombre}${item.nota ? ' — <em>' + item.nota + '</em>' : ''}</span>
                <span>$${item.precio.toLocaleString('es-AR')}</span>
            </div>`;
        }).join('');
        document.getElementById('total-val').innerText = `Total: $${total.toLocaleString('es-AR')}`;
    }

    function enviarPedido() {
        if (carrito.length === 0) return alert("Tu carrito está vacío 🛒");
        let msg = "*NUEVO PEDIDO - Venezolanísimo* 🇻🇪%0A%0A";
        carrito.forEach(item => {
            msg += `▪️ ${item.cant}x ${item.nombre}%0A`;
            if (item.nota) msg += `   _Nota: ${item.nota}_%0A`;
        });
        const total = carrito.reduce((s, i) => s + i.precio, 0);
        msg += `%0A*Total: $${total.toLocaleString('es-AR')}*`;
        window.open(`https://wa.me/543541607420?text=${msg}`);
    }

    init();
</script>
</body>
</html>
